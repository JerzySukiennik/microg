<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 212" width="310" height="212" role="img" aria-label="MicroG">
  <title>MicroG</title>
  <!--
    Construction grid (do not eyeball these):
      stroke weight  15   identical for both glyphs
      baseline      140   bowl of the mu and foot of the G share it
      x-height top   74   mu
      descender     172   mu, anchors the mark downward
      G centre  200,90    radius 50
    The G sits at x=200 rather than 214: further out, the pair reads as two
    separate symbols instead of one monogram.
  -->
  <g fill="none" stroke="#fff" stroke-width="15" stroke-linecap="butt" stroke-linejoin="round" transform="translate(0,11)">
    <path d="M60 74 L60 172"/>
    <path d="M60 104 Q60 140 96 140 Q132 140 132 104 L132 74"/>
    <path d="M243 62 a50 50 0 1 0 0 56 V90 H200"/>
  </g>
</svg>
